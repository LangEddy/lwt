  .slide-up { animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1) both; }

    star: 'M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z',

    eye: 'M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8zM12 12a3 3 0 100-6 3 3 0 000 6z',

// ─── TOKENIZER ─────────────────────────────────────────────────────────────────
function tokenize(text, dir) {
  // Simple regex tokenizer: words and non-word punctuation/spaces
  const tokens = [];
  // Split into word chars and non-word chars
  const re = /[\u0000-\u002F\u003A-\u0040\u005B-\u0060\u007B-\u00BF\s]+|[\w\u00C0-\u024F\u0400-\u04FF\u0590-\u05FF\u0600-\u06FF\u4E00-\u9FFF\u3040-\u309F\u30A0-\u30FF]+/g;
  let m;
  while ((m = re.exec(text)) !== null) {
    const val = m[0];
    const isWord = /[\w\u00C0-\u024F\u0400-\u04FF\u0590-\u05FF\u0600-\u06FF\u4E00-\u9FFF\u3040-\u309F\u30A0-\u30FF]/.test(val);
    tokens.push({ value: val, isWord });
  }
  return tokens;
}

// ─── LEVEL COLORS ─────────────────────────────────────────────────────────────
const LEVEL_COLORS = [
  { bg: 'oklch(87% 0.07 10)', text: 'oklch(32% 0.14 10)' },   // 0 unseen
  { bg: 'oklch(80% 0.13 15)', text: 'oklch(28% 0.16 15)' },   // 1 unknown
  { bg: 'oklch(82% 0.10 30)', text: 'oklch(30% 0.14 30)' },   // 2 seen
  { bg: 'oklch(84% 0.10 70)', text: 'oklch(32% 0.13 70)' },   // 3 ok-ish
  { bg: 'oklch(84% 0.10 130)', text: 'oklch(32% 0.13 130)' }, // 4 good
  { bg: 'transparent', text: 'inherit' },                      // 5 known
];

const LEVEL_LABELS = ['Unseen', 'Unknown', 'Seen', 'Ok-ish', 'Good', 'Known'];
const LEVEL_SHORT = ['?', 'L1', 'L2', 'L3', 'L4', 'K'];

// ─── APP STATE ─────────────────────────────────────────────────────────────────
function useAppState() {
  const [screen, setScreen] = useState('auth');
  const [authMode, setAuthMode] = useState('login');
  const [user, setUser] = useState(null);
  const [texts, setTexts] = useState(SAMPLE_TEXTS);
  const [wordMap, setWordMap] = useState(() => {
    const m = {};
    SAMPLE_WORDS.forEach(w => { m[w.id] = w; });
    return m;
  });
  const [knownWords, setKnownWords] = useState({ ...KNOWN_WORDS });
  const [currentTextId, setCurrentTextId] = useState(null);
  const [activeWordPopup, setActiveWordPopup] = useState(null); // {word, rect, textId}
  const [wordListFilter, setWordListFilter] = useState({ lang: 'all', level: 'all', search: '' });
  const [learnQueue, setLearnQueue] = useState([]);
  const [learnIndex, setLearnIndex] = useState(0);
  const [learnPhase, setLearnPhase] = useState('question'); // question | answer
  const [toast, setToast] = useState(null);
  const [sidebarOpen, setSidebarOpen] = useState(false);

  const showToast = useCallback((msg, type = 'success') => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 2500);
  }, []);

  const navigate = useCallback((s) => {
    setScreen(s);
    setSidebarOpen(false);
    setActiveWordPopup(null);
  }, []);

  const login = useCallback((email, password) => {
    setUser({ ...DEMO_USER, email });
    setScreen('dashboard');
  }, []);

  const logout = useCallback(() => {
    setUser(null);
    setScreen('auth');
  }, []);

  const updateWordLevel = useCallback((word, level) => {
    const key = word.toLowerCase();
    setKnownWords(prev => ({ ...prev, [key]: level }));
    // Update or add to wordMap
    setWordMap(prev => {
      const existing = Object.values(prev).find(w => w.word.toLowerCase() === key);
      if (existing) {
        return { ...prev, [existing.id]: { ...existing, level } };
      }
      const id = 'w' + Date.now();
      return { ...prev, [id]: { id, word, language: 'LAT', level, note: '', examples: [] } };
    });
  }, []);

  const updateWordNote = useCallback((word, note) => {
    const key = word.toLowerCase();
    setWordMap(prev => {
      const existing = Object.values(prev).find(w => w.word.toLowerCase() === key);
      if (existing) {
        return { ...prev, [existing.id]: { ...existing, note } };
      }
      const id = 'w' + Date.now();
      return { ...prev, [id]: { id, word, language: 'LAT', level: 0, note, examples: [] } };
    });
  }, []);

  const addWordExample = useCallback((word, sentence) => {
    const key = word.toLowerCase();
    setWordMap(prev => {
      const existing = Object.values(prev).find(w => w.word.toLowerCase() === key);
      if (existing) {
        return { ...prev, [existing.id]: { ...existing, examples: [...(existing.examples || []), sentence] } };
      }
      return prev;
    });
  }, []);

  const addText = useCallback((title, language, content) => {
    const id = String(Date.now());
    const lang = LANGUAGES.find(l => l.name === language || l.code === language);
    setTexts(prev => [{ id, title, language: lang ? lang.code : 'EN', dir: lang ? lang.dir : 'ltr', content, createdAt: new Date().toISOString().slice(0, 10) }, ...prev]);
    return id;
  }, []);

  const deleteText = useCallback((id) => {
    setTexts(prev => prev.filter(t => t.id !== id));
  }, []);

  const startLearn = useCallback(() => {
    // Build queue from words with examples
    const queue = Object.values(wordMap).filter(w => w.examples && w.examples.length > 0 && w.level < 5);
    setLearnQueue(queue);
    setLearnIndex(0);
    setLearnPhase('question');
    navigate('learn');
  }, [wordMap, navigate]);

  const wordList = useMemo(() => Object.values(wordMap), [wordMap]);

  return {
    screen, navigate, authMode, setAuthMode,
    user, login, logout,
    texts, addText, deleteText,
    wordMap, wordList, knownWords, updateWordLevel, updateWordNote, addWordExample,
    currentTextId, setCurrentTextId,
    activeWordPopup, setActiveWordPopup,
    wordListFilter, setWordListFilter,
    learnQueue, learnIndex, setLearnIndex, learnPhase, setLearnPhase, startLearn,
    toast, showToast, sidebarOpen, setSidebarOpen,
  };
}

// ─── UI COMPONENTS ─────────────────────────────────────────────────────────────

const Btn = ({ children, variant = 'primary', onClick, style, disabled, small }) => {
  const base = {
    display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
    gap: 6, fontFamily: 'inherit', fontWeight: 600, cursor: disabled ? 'not-allowed' : 'pointer',
    border: 'none', borderRadius: 10, transition: 'all 0.15s',
    padding: small ? '8px 16px' : '13px 20px',
    fontSize: small ? 13 : 15,
    opacity: disabled ? 0.5 : 1,
  };
  const variants = {
    primary: { background: 'var(--text)', color: 'var(--surface)', },
    secondary: { background: 'var(--surface)', color: 'var(--text)', border: '1.5px solid var(--border)' },
    ghost: { background: 'transparent', color: 'var(--text2)', padding: small ? '6px 10px' : '10px 14px' },
    danger: { background: 'var(--red-bg)', color: 'var(--red)' },
    green: { background: 'var(--green)', color: '#fff' },
  };
  return (
    <button style={{ ...base, ...variants[variant], ...style }} onClick={onClick} disabled={disabled}>
      {children}
    </button>
  );
};

const Input = ({ label, placeholder, value, onChange, type = 'text', multiline, rows = 4, style }) => (
  <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
    {label && <label style={{ fontSize: 13, fontWeight: 600, color: 'var(--text2)', letterSpacing: '0.03em', textTransform: 'uppercase' }}>{label}</label>}
    {multiline ? (
      <textarea
        rows={rows}
        placeholder={placeholder}
        value={value}
        onChange={e => onChange(e.target.value)}
        style={{ padding: '12px 14px', borderRadius: 10, border: '1.5px solid var(--border)', background: 'var(--surface)', fontSize: 15, resize: 'vertical', lineHeight: 1.6, outline: 'none', fontFamily: 'inherit', color: 'var(--text)', ...style }}
      />
    ) : (
      <input
        type={type}
        placeholder={placeholder}
        value={value}
        onChange={e => onChange(e.target.value)}
        style={{ padding: '12px 14px', borderRadius: 10, border: '1.5px solid var(--border)', background: 'var(--surface)', fontSize: 15, outline: 'none', fontFamily: 'inherit', color: 'var(--text)', ...style }}
      />
    )}
  </div>
);

const Select = ({ label, value, onChange, options, hint }) => (
  <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
    {label && <label style={{ fontSize: 13, fontWeight: 600, color: 'var(--text2)', letterSpacing: '0.03em', textTransform: 'uppercase' }}>{label}</label>}
    <div style={{ position: 'relative' }}>
      <select
        value={value} onChange={e => onChange(e.target.value)}
        style={{ width: '100%', padding: '12px 36px 12px 14px', borderRadius: 10, border: '1.5px solid var(--border)', background: 'var(--surface)', fontSize: 15, appearance: 'none', outline: 'none', fontFamily: 'inherit', color: 'var(--text)', cursor: 'pointer' }}
      >
        {options.map(o => <option key={o.value || o} value={o.value || o}>{o.label || o}</option>)}
      </select>
      <span style={{ position: 'absolute', right: 12, top: '50%', transform: 'translateY(-50%)', pointerEvents: 'none', color: 'var(--text3)' }}>
        <Icon name="chevron_down" size={16} />
      </span>
    </div>
    {hint && <span style={{ fontSize: 12, color: 'var(--text3)' }}>{hint}</span>}
  </div>
);

const LangBadge = ({ code, size = 'sm' }) => (
  <span style={{
    display: 'inline-flex', alignItems: 'center', padding: size === 'sm' ? '2px 7px' : '3px 9px',
    borderRadius: 6, background: 'var(--bg2)', color: 'var(--text2)',
    fontSize: size === 'sm' ? 11 : 12, fontWeight: 700, letterSpacing: '0.05em'
  }}>{code}</span>
);

const LevelBadge = ({ level }) => (
  <span style={{
    display: 'inline-flex', alignItems: 'center', padding: '2px 8px',
    borderRadius: 6, background: LEVEL_COLORS[level]?.bg || 'var(--bg2)',
    color: LEVEL_COLORS[level]?.text || 'var(--text2)',
    fontSize: 11, fontWeight: 700, letterSpacing: '0.04em'
  }}>{LEVEL_SHORT[level]}</span>
);

const Card = ({ children, style, onClick }) => (
  <div onClick={onClick} style={{
    background: 'var(--surface)', borderRadius: 12, border: '1px solid var(--border)',
    padding: 16, ...(onClick ? { cursor: 'pointer' } : {}), ...style
  }}>{children}</div>
);

// ─── TOAST ─────────────────────────────────────────────────────────────────────
const Toast = ({ toast }) => {
  if (!toast) return null;
  return (
    <div style={{
      position: 'fixed', bottom: 90, left: '50%', transform: 'translateX(-50%)',
      background: 'var(--text)', color: 'var(--surface)', padding: '10px 20px',
      borderRadius: 20, fontSize: 14, fontWeight: 500, zIndex: 9999,
      pointerEvents: 'none', animation: 'fadeIn 0.2s ease',
      whiteSpace: 'nowrap', boxShadow: '0 4px 20px rgba(0,0,0,0.18)',
    }}>{toast.msg}</div>
  );
};

// ─── HEADER ────────────────────────────────────────────────────────────────────
const Header = ({ title, onBack, onMenu, actions, user, onLogout }) => (
  <header style={{
    display: 'flex', alignItems: 'center', gap: 8,
    padding: '0 16px', height: 'var(--header-h)',
    background: 'var(--text)', color: 'var(--surface)',
    flexShrink: 0, position: 'sticky', top: 0, zIndex: 100,
  }}>
    {onMenu && (
      <button onClick={onMenu} style={{ padding: 8, color: 'var(--surface)', background: 'none', border: 'none', cursor: 'pointer', borderRadius: 8, display: 'flex' }}>
        <Icon name="menu" size={20} color="currentColor" />
      </button>
    )}
    {onBack && (
      <button onClick={onBack} style={{ padding: 8, color: 'var(--surface)', background: 'none', border: 'none', cursor: 'pointer', borderRadius: 8, display: 'flex' }}>
        <Icon name="back" size={20} color="currentColor" />
      </button>
    )}
    <span style={{ flex: 1, fontWeight: 700, fontSize: 17, letterSpacing: '-0.01em', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{title}</span>
    {actions}
    {user && (
      <button onClick={onLogout} style={{ padding: 8, color: 'var(--surface)', background: 'none', border: 'none', cursor: 'pointer', borderRadius: 8, display: 'flex' }}>
        <Icon name="logout" size={18} color="currentColor" />
      </button>
    )}
  </header>
);

// ─── BOTTOM NAV ─────────────────────────────────────────────────────────────────
const BottomNav = ({ active, navigate }) => {
  const tabs = [
    { id: 'dashboard', icon: 'home', label: 'Home' },
    { id: 'texts', icon: 'book', label: 'Texts' },
    { id: 'learn', icon: 'brain', label: 'Learn' },
    { id: 'wordlist', icon: 'list', label: 'Words' },
  ];
  return (
    <nav style={{
      display: 'flex', alignItems: 'stretch',
      background: 'var(--surface)', borderTop: '1px solid var(--border)',
      height: 'var(--nav-h)', flexShrink: 0, position: 'sticky', bottom: 0, zIndex: 100,
    }}>
      {tabs.map(t => (
        <button key={t.id} onClick={() => navigate(t.id)} style={{
          flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
          gap: 3, background: 'none', border: 'none', cursor: 'pointer',
          color: active === t.id ? 'var(--text)' : 'var(--text3)',
          fontSize: 11, fontWeight: active === t.id ? 700 : 500, transition: 'color 0.15s',
        }}>
          <Icon name={t.icon} size={22} strokeWidth={active === t.id ? 2.2 : 1.6} />
          {t.label}
        </button>
      ))}
    </nav>
  );
};

// ─── SIDEBAR ───────────────────────────────────────────────────────────────────
const Sidebar = ({ open, onClose, navigate, user, onLogout }) => (
  <>
    {open && <div onClick={onClose} style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.4)', zIndex: 200, backdropFilter: 'blur(2px)' }} />}
    <aside style={{
      position: 'fixed', top: 0, left: 0, bottom: 0, width: 280,
      background: 'var(--surface)', borderRight: '1px solid var(--border)',
      zIndex: 201, display: 'flex', flexDirection: 'column',
      transform: open ? 'translateX(0)' : 'translateX(-100%)',
      transition: 'transform 0.25s cubic-bezier(0.4,0,0.2,1)',
      boxShadow: open ? '4px 0 24px rgba(0,0,0,0.12)' : 'none',

// ─── READING VIEW ─────────────────────────────────────────────────────────────
const ReadScreen = ({ text, knownWords, updateWordLevel, updateWordNote, addWordExample, showToast, onBack, tweaks }) => {
  const [selectedWord, setSelectedWord] = useState(null);
  const [sweep, setSweep] = useState(false);

  if (!text) return (
    <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--text3)' }}>
      <div style={{ textAlign: 'center' }}>
        <Icon name="book" size={48} />
        <p style={{ marginTop: 12, fontSize: 16 }}>No text selected</p>
      </div>
    </div>
  );

  const tokens = tokenize(text.content, text.dir);
  const unseenCount = tokens.filter(t => t.isWord && knownWords[t.value.toLowerCase()] === undefined).length;

  const handleWordClick = (word) => {
    setSelectedWord(word);
  };

  const handleSweepAll = () => {
    tokens.filter(t => t.isWord && knownWords[t.value.toLowerCase()] === undefined)
      .forEach(t => updateWordLevel(t.value, 1));
    showToast(`Marked ${unseenCount} words as L1`);
  };

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minHeight: 0 }}>
      {/* Read toolbar */}
      <div style={{ padding: '8px 14px', borderBottom: '1px solid var(--border)', background: 'var(--surface)', display: 'flex', alignItems: 'center', gap: 8, flexShrink: 0 }}>
        <div style={{ display: 'flex', gap: 4, marginRight: 8 }}>
          {[1,2,3,4,5].map(i => (
            <div key={i} style={{ width: 16, height: 16, borderRadius: '50%', background: LEVEL_COLORS[i].bg, border: '1px solid var(--border)' }} />
          ))}
        </div>
        <div style={{ flex: 1 }} />
        <button style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text2)', padding: 6 }}>
          <Icon name="edit" size={16} />
        </button>
        {unseenCount > 0 && (
          <button onClick={handleSweepAll} style={{
            padding: '5px 12px', borderRadius: 20, background: 'var(--text)', color: 'var(--surface)',
            border: 'none', cursor: 'pointer', fontSize: 12, fontWeight: 700,
          }}>
            Sweep ({unseenCount})
          </button>
        )}
        <button style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text3)', padding: 6 }}>
          <Icon name="trash" size={16} />
        </button>
      </div>

      {/* Text body */}
      <div style={{ flex: 1, overflowY: 'auto', padding: '20px 18px 32px' }}>
        <div style={{
          maxWidth: 640, margin: '0 auto',
          fontSize: 17, lineHeight: tweaks ? tweaks.readingLineHeight : 2.0,
          direction: text.dir, textAlign: text.dir === 'rtl' ? 'right' : 'left',
          fontFamily: 'Georgia, serif', color: 'var(--text)',
        }}>
          {tokens.map((token, idx) => {
            if (!token.isWord) {
              return <span key={idx}>{token.value}</span>;
            }
            const key = token.value.toLowerCase();
            const level = knownWords[key] !== undefined ? knownWords[key] : 0;
            const isUnseen = knownWords[key] === undefined;
            const colors = isUnseen ? LEVEL_COLORS[0] : LEVEL_COLORS[level];
            const isTransparent = level === 5 && !isUnseen;

            return (
              <span key={idx}
                onClick={() => handleWordClick(token.value)}
                style={{
                  background: colors.bg,
                  color: isTransparent ? 'inherit' : colors.text,
                  borderRadius: 4,
                  padding: isTransparent ? '1px 0' : '1px 3px',
                  cursor: 'pointer',
                  display: 'inline',
                  transition: 'background 0.15s',
                }}
              >
                {token.value}
              </span>
            );
          })}
        </div>
      </div>

      {selectedWord && (
        <WordPopup
          data={{ word: selectedWord }}
          onClose={() => setSelectedWord(null)}
          knownWords={knownWords}
          updateWordLevel={updateWordLevel}
          updateWordNote={updateWordNote}
          addWordExample={addWordExample}
          showToast={showToast}
        />
      )}
    </div>
  );
};

// ─── LEARN (SPACED REPETITION) ────────────────────────────────────────────────
const LearnScreen = ({ wordList, learnQueue, learnIndex, setLearnIndex, learnPhase, setLearnPhase, updateWordLevel, showToast, navigate }) => {
  const [answerNote, setAnswerNote] = useState('');

  if (learnQueue.length === 0) {
    return (
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 32, gap: 16 }}>
        <div style={{ fontSize: 56 }}>🎯</div>
        <h2 style={{ fontSize: 22, fontWeight: 700, textAlign: 'center' }}>No cards to review!</h2>
        <p style={{ color: 'var(--text2)', textAlign: 'center', lineHeight: 1.5 }}>Add example sentences to words while reading to start learning with spaced repetition.</p>
        <Btn variant="primary" onClick={() => navigate('texts')}>Go Read</Btn>
      </div>
    );
  }

  if (learnIndex >= learnQueue.length) {
    return (
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 32, gap: 16 }}>
        <div style={{ fontSize: 56 }}>✅</div>
        <h2 style={{ fontSize: 22, fontWeight: 700 }}>Session complete!</h2>
        <p style={{ color: 'var(--text2)' }}>You reviewed {learnQueue.length} cards.</p>
        <Btn variant="primary" onClick={() => { setLearnIndex(0); setLearnPhase('question'); }}>Review Again</Btn>
        <Btn variant="ghost" onClick={() => navigate('dashboard')}>Back to Home</Btn>
      </div>
    );
  }

  const card = learnQueue[learnIndex];
  const example = card.examples?.[0] || '';
  const progress = learnIndex / learnQueue.length;

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: 20, gap: 16, maxWidth: 540, margin: '0 auto', width: '100%' }}>
      {/* Progress */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
        <div style={{ flex: 1, height: 6, background: 'var(--bg2)', borderRadius: 3, overflow: 'hidden' }}>
          <div style={{ height: '100%', width: `${progress * 100}%`, background: 'var(--green)', borderRadius: 3, transition: 'width 0.3s ease' }} />
        </div>
        <span style={{ fontSize: 13, color: 'var(--text2)', fontWeight: 600 }}>{learnIndex}/{learnQueue.length}</span>
      </div>

      {/* Card */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center', gap: 16 }}>
        <div style={{ background: 'var(--surface)', borderRadius: 16, border: '1px solid var(--border)', padding: 24, minHeight: 180, display: 'flex', flexDirection: 'column', justifyContent: 'center', gap: 16 }}>
          <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text3)', textTransform: 'uppercase', letterSpacing: '0.06em' }}>Translate this sentence</div>
          <p style={{ fontSize: 19, lineHeight: 1.7, fontFamily: 'Georgia, serif', color: 'var(--text)' }}>
            {/* Highlight the target word */}
            {example.split(new RegExp(`(${card.word})`, 'i')).map((part, i) =>
              part.toLowerCase() === card.word.toLowerCase()
                ? <mark key={i} style={{ background: LEVEL_COLORS[card.level]?.bg || LEVEL_COLORS[0].bg, borderRadius: 4, padding: '1px 3px' }}>{part}</mark>
                : <span key={i}>{part}</span>
            )}
          </p>

          {learnPhase === 'answer' && (
            <div style={{ borderTop: '1px solid var(--border)', paddingTop: 16, animation: 'fadeIn 0.2s ease' }}>
              <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text3)', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 8 }}>Your note</div>
              <div style={{ fontSize: 15, color: card.note ? 'var(--text)' : 'var(--text3)', marginBottom: 10 }}>{card.note || 'No note added yet'}</div>
              <textarea
                placeholder="Update your note…"
                value={answerNote} onChange={e => setAnswerNote(e.target.value)}
                rows={2}
                style={{ width: '100%', padding: '8px 12px', borderRadius: 8, border: '1.5px solid var(--border)', background: 'var(--bg)', fontSize: 14, resize: 'none', outline: 'none', fontFamily: 'inherit' }}
              />
            </div>
          )}
        </div>

        {learnPhase === 'question' ? (
          <Btn variant="primary" style={{ width: '100%' }} onClick={() => setLearnPhase('answer')}>
            Show Answer
          </Btn>
        ) : (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text2)', textAlign: 'center' }}>How well did you know it?</div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 8 }}>
              {[
                { label: 'Again', color: 'var(--red)', bg: 'var(--red-bg)', lvl: 1 },
                { label: 'Hard', color: 'var(--amber)', bg: 'var(--amber-bg)', lvl: 2 },
                { label: 'Good', color: 'var(--green)', bg: 'var(--green-bg)', lvl: 4 },
                { label: 'Easy', color: 'var(--green)', bg: 'var(--green-bg)', lvl: 5 },
              ].map(btn => (
                <button key={btn.label} onClick={() => {
                  updateWordLevel(card.word, btn.lvl);
                  setLearnIndex(i => i + 1);
                  setLearnPhase('question');
                  setAnswerNote('');
                  showToast(`Marked: ${btn.label}`);
                }} style={{
                  padding: '12px 8px', borderRadius: 10, border: `1.5px solid ${btn.color}`,
                  background: btn.bg, cursor: 'pointer', fontSize: 13, fontWeight: 700,
                  color: btn.color, transition: 'all 0.12s',
                }}>
                  {btn.label}
                </button>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
const App = () => {
  const state = useAppState();
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // Expose wordMap globally for popup
  useEffect(() => {
    window.wordMapRef = state.wordMap;
  }, [state.wordMap]);

  // Apply theme
  useEffect(() => {
    const root = document.documentElement;
    if (tweaks.theme === 'dark') {
      root.style.setProperty('--bg', 'oklch(14% 0.01 250)');
      root.style.setProperty('--bg2', 'oklch(19% 0.01 250)');
      root.style.setProperty('--bg3', 'oklch(24% 0.01 250)');
      root.style.setProperty('--surface', 'oklch(18% 0.01 250)');
      root.style.setProperty('--border', 'oklch(28% 0.01 250)');
      root.style.setProperty('--text', 'oklch(95% 0.006 80)');
      root.style.setProperty('--text2', 'oklch(70% 0.01 250)');
      root.style.setProperty('--text3', 'oklch(50% 0.01 250)');
    } else if (tweaks.theme === 'sepia') {
      root.style.setProperty('--bg', 'oklch(95% 0.025 80)');
      root.style.setProperty('--bg2', 'oklch(91% 0.028 75)');
      root.style.setProperty('--bg3', 'oklch(87% 0.030 75)');
      root.style.setProperty('--surface', 'oklch(97% 0.020 80)');
      root.style.setProperty('--border', 'oklch(85% 0.030 75)');
      root.style.setProperty('--text', 'oklch(20% 0.03 70)');
      root.style.setProperty('--text2', 'oklch(40% 0.025 70)');
      root.style.setProperty('--text3', 'oklch(60% 0.020 70)');
    } else {
      root.style.setProperty('--bg', 'oklch(97% 0.007 80)');
      root.style.setProperty('--bg2', 'oklch(93% 0.010 80)');
      root.style.setProperty('--bg3', 'oklch(89% 0.012 80)');
      root.style.setProperty('--surface', 'oklch(99% 0.004 80)');
      root.style.setProperty('--border', 'oklch(88% 0.012 80)');
      root.style.setProperty('--text', 'oklch(14% 0.012 250)');
      root.style.setProperty('--text2', 'oklch(45% 0.015 250)');
      root.style.setProperty('--text3', 'oklch(65% 0.010 250)');
    }
    root.style.setProperty('font-size', `${tweaks.fontScale * 16}px`);
  }, [tweaks.theme, tweaks.fontScale]);

  const {
    screen, navigate, authMode, setAuthMode,
    user, login, logout,
    texts, addText, deleteText,
    wordList, knownWords, updateWordLevel, updateWordNote, addWordExample,
    currentTextId, setCurrentTextId,
    wordListFilter, setWordListFilter,
    learnQueue, learnIndex, setLearnIndex, learnPhase, setLearnPhase, startLearn,
    toast, showToast, sidebarOpen, setSidebarOpen,
  } = state;

  const currentText = texts.find(t => t.id === currentTextId);
  const isAuthed = screen !== 'auth';

  const getHeader = () => {
    switch (screen) {
      case 'dashboard': return { title: 'Dashboard', onMenu: () => setSidebarOpen(true) };
      case 'texts': return { title: 'Texts', onMenu: () => setSidebarOpen(true) };
      case 'new-text': return { title: 'New Text', onBack: () => navigate('texts') };
      case 'read': return { title: currentText?.title || 'Reading', onBack: () => navigate('texts') };
      case 'wordlist': return { title: 'Word List', onMenu: () => setSidebarOpen(true) };
      case 'learn': return { title: 'Learn', onMenu: () => setSidebarOpen(true) };
      case 'languages': return { title: 'Languages', onBack: () => navigate('settings') };
      case 'settings': return { title: 'Settings', onMenu: () => setSidebarOpen(true) };
      default: return { title: 'LWT' };
    }
  };

  const headerProps = getHeader();
  // Desktop: sidebar always visible, no bottom nav, no hamburger
  const [isDesktop, setIsDesktop] = useState(() => window.innerWidth >= 900);
  useEffect(() => {
    const handler = () => setIsDesktop(window.innerWidth >= 900);
    window.addEventListener('resize', handler);
    return () => window.removeEventListener('resize', handler);
  }, []);

  const showBottomNav = isAuthed && !isDesktop && !['new-text', 'read'].includes(screen);
  const showDesktopSidebar = isAuthed && isDesktop;

  const renderScreen = () => {
    switch (screen) {
      case 'auth':
        return <AuthScreen mode={authMode} setMode={setAuthMode} onLogin={login} />;
      case 'dashboard':
        return <DashboardScreen user={user} texts={texts} navigate={navigate} setCurrentTextId={setCurrentTextId} wordList={wordList} startLearn={startLearn} />;
      case 'texts':
        return <TextsScreen texts={texts} navigate={navigate} setCurrentTextId={setCurrentTextId} deleteText={deleteText} showToast={showToast} />;
      case 'new-text':
        return <NewTextScreen onBack={() => navigate('texts')} addText={addText} navigate={navigate} setCurrentTextId={setCurrentTextId} showToast={showToast} />;
      case 'read':
        return <ReadScreen text={currentText} knownWords={knownWords} updateWordLevel={updateWordLevel} updateWordNote={updateWordNote} addWordExample={addWordExample} showToast={showToast} onBack={() => navigate('texts')} tweaks={tweaks} />;
      case 'wordlist':
        return <WordListScreen wordList={wordList} knownWords={knownWords} updateWordLevel={updateWordLevel} showToast={showToast} filter={wordListFilter} setFilter={setWordListFilter} />;
      case 'learn':
        return <LearnScreen wordList={wordList} learnQueue={learnQueue} learnIndex={learnIndex} setLearnIndex={setLearnIndex} learnPhase={learnPhase} setLearnPhase={setLearnPhase} updateWordLevel={updateWordLevel} showToast={showToast} navigate={navigate} />;
      case 'languages':
        return <LanguagesScreen />;
      case 'settings':
        return <SettingsScreen user={user} logout={logout} />;
      default:
        return <DashboardScreen user={user} texts={texts} navigate={navigate} setCurrentTextId={setCurrentTextId} wordList={wordList} startLearn={startLearn} />;
    }
  };

  // ── Desktop sidebar (always visible, not a drawer) ──────────────────────────
  const DesktopSidebar = () => {
    const navItems = [
      { id: 'dashboard', icon: 'home', label: 'Dashboard' },
      { id: 'texts', icon: 'book', label: 'Texts' },
      { id: 'learn', icon: 'brain', label: 'Learn' },
      { id: 'wordlist', icon: 'list', label: 'Word List' },
      { id: 'languages', icon: 'languages', label: 'Languages' },
      { id: 'settings', icon: 'settings', label: 'Settings' },
    ];
    return (
      <aside style={{
        width: 240, flexShrink: 0, display: 'flex', flexDirection: 'column',
        borderRight: '1px solid var(--border)', background: 'var(--surface)',
        height: '100%', overflow: 'hidden',
      }}>
        {/* Brand */}
        <div style={{ padding: '20px 20px 14px', borderBottom: '1px solid var(--border)' }}>
          <div style={{ fontFamily: 'var(--font-serif)', fontSize: 24, letterSpacing: '-0.02em' }}>LWT</div>
          <div style={{ fontSize: 12, color: 'var(--text3)', marginTop: 1 }}>Learn With Text</div>
        </div>
        {/* User */}
        {user && (
          <div style={{ padding: '12px 16px', borderBottom: '1px solid var(--border)', display: 'flex', gap: 10, alignItems: 'center' }}>
            <div style={{ width: 34, height: 34, borderRadius: '50%', background: 'var(--bg2)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 15, fontWeight: 700, flexShrink: 0 }}>
              {user.name[0]}
            </div>
            <div style={{ minWidth: 0 }}>
              <div style={{ fontSize: 13, fontWeight: 600, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{user.name}</div>
              <div style={{ fontSize: 11, color: 'var(--text3)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{user.email}</div>
            </div>
          </div>
        )}
        {/* Nav */}
        <nav style={{ flex: 1, overflowY: 'auto', padding: '8px 10px' }}>
          {navItems.map(item => (
            <button key={item.id} onClick={() => navigate(item.id)} style={{
              display: 'flex', alignItems: 'center', gap: 10, width: '100%',
              padding: '10px 12px', borderRadius: 9, background: screen === item.id ? 'var(--bg2)' : 'none',
              border: 'none', cursor: 'pointer', color: screen === item.id ? 'var(--text)' : 'var(--text2)',
              fontSize: 14, fontWeight: screen === item.id ? 700 : 500, transition: 'all 0.12s',
            }}
            onMouseEnter={e => { if (screen !== item.id) e.currentTarget.style.background = 'var(--bg)'; }}
            onMouseLeave={e => { if (screen !== item.id) e.currentTarget.style.background = 'none'; }}
            >
              <Icon name={item.icon} size={17} strokeWidth={screen === item.id ? 2.2 : 1.6} />
              {item.label}
            </button>
          ))}
        </nav>
        {/* Sign out */}
        <div style={{ padding: '10px 10px 16px', borderTop: '1px solid var(--border)' }}>
          <button onClick={logout} style={{
            display: 'flex', alignItems: 'center', gap: 10, width: '100%',
            padding: '10px 12px', borderRadius: 9, background: 'none', border: 'none',
            cursor: 'pointer', color: 'var(--red)', fontSize: 14, fontWeight: 500,
          }}>
            <Icon name="logout" size={17} color="var(--red)" /> Sign Out
          </button>
        </div>
      </aside>
    );
  };

  // ── Desktop page header (inside main content, not top bar) ──────────────────
  const DesktopPageHeader = () => {
    const titles = {
      dashboard: 'Dashboard', texts: 'Texts', 'new-text': 'New Reading Text',
      read: currentText?.title || 'Reading', wordlist: 'Word List',
      learn: 'Learn', languages: 'Languages', settings: 'Settings',
    };
    const showBack = ['new-text', 'read'].includes(screen);
    const backTarget = screen === 'read' ? 'texts' : 'texts';
    return (
      <div style={{ padding: '20px 24px 0', display: 'flex', alignItems: 'center', gap: 10, flexShrink: 0 }}>
        {showBack && (
          <button onClick={() => navigate(backTarget)} style={{ padding: '6px 8px', background: 'var(--bg2)', border: 'none', borderRadius: 8, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6, color: 'var(--text2)', fontSize: 13, fontWeight: 600 }}>
            <Icon name="back" size={15} /> Back
          </button>
        )}
        <h1 style={{ fontSize: 22, fontWeight: 700, letterSpacing: '-0.02em' }}>{titles[screen] || 'LWT'}</h1>
      </div>
    );
  };

  if (screen === 'auth') {
    return (
      <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
        <AuthScreen mode={authMode} setMode={setAuthMode} onLogin={login} />
        <Toast toast={toast} />
        <AppTweaks tweaks={tweaks} setTweak={setTweak} />
      </div>
    );
  }

  return (
    <div style={{ display: 'flex', height: '100%', overflow: 'hidden' }}>
      {/* Desktop: persistent sidebar */}
      {showDesktopSidebar && <DesktopSidebar />}

      {/* Main content column */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0, height: '100%', overflow: 'hidden' }}>

        {/* Mobile top header */}
        {!isDesktop && (
          <Header
            title={headerProps.title}
            onBack={headerProps.onBack}
            onMenu={headerProps.onMenu}
            user={['dashboard', 'texts', 'wordlist', 'learn', 'settings'].includes(screen) ? user : null}
            onLogout={logout}
          />
        )}

        {/* Desktop inline page title */}
        {isDesktop && <DesktopPageHeader />}

        {/* Screen content */}
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minHeight: 0, overflow: 'hidden' }}>
          {renderScreen()}
        </div>

        {/* Mobile bottom nav */}
        {showBottomNav && <BottomNav active={screen} navigate={navigate} />}
      </div>

      {/* Mobile: overlay sidebar (drawer) */}
      {!isDesktop && (
        <Sidebar open={sidebarOpen} onClose={() => setSidebarOpen(false)} navigate={navigate} user={user} onLogout={logout} />
      )}

      <Toast toast={toast} />
      <AppTweaks tweaks={tweaks} setTweak={setTweak} />
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
