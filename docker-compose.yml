services:
  db:
    image: postgres:17-alpine
    ports:
      - "54322:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lwt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lwt}
      POSTGRES_DB: ${POSTGRES_DB:-lwt}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lwt}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      PORT: 3000
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/app/migrations:ro
    develop:
      watch:
        - action: rebuild
          path: ./backend

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    develop:
      watch:
        - action: rebuild
          path: ./frontend

volumes:
  postgres_data:
