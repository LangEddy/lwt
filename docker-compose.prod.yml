services:
  backend:
    image: ghcr.io/${GITHUB_USER}/lwt-backend:${IMAGE_TAG:-latest}
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SUPABASE_URL: ${SUPABASE_URL}
      PORT: 3000
    restart: unless-stopped
    networks:
      - internal

  frontend:
    image: ghcr.io/${GITHUB_USER}/lwt-frontend:${IMAGE_TAG:-latest}
    ports:
      - "81:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - internal

networks:
  internal:
    driver: bridge
